# vala-lint 0.1.0 config. The check on/off values live under [Checks]; per-check
# tuning under its own section. (An earlier version used a [Config] header, which
# 0.1.0 does not recognize, so the whole file was silently ignored.)
[Checks]
block-opening-brace-space-before=error
double-semicolon=error
double-spaces=error
ellipsis=off
line-length=error
naming-convention=off
no-space=error
note=off
# Off: the project style (and config-uncrustify.cfg) uses no space before the
# opening paren (e.g. foo(), void run()), NOT the GNOME foo () style.
space-before-paren=off
use-of-tabs=error
trailing-newlines=error
trailing-whitespace=error
unnecessary-string-template=error

[Disabler]
disable-by-inline-comments=true

[line-length]
max-line-length=100
ignore-comments=true

[naming-convention]
exceptions=UUID,

[note]
keywords=TODO,FIXME,
