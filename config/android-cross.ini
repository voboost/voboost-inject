# Meson cross-file for Android arm64-v8a via NDK.
# Requires ANDROID_NDK_HOME set to the NDK root.
# Used by `make build-android`, which configures via frida's meson
# (subprojects/frida-core/releng/meson) — standard meson cannot build frida's
# native (build-machine) subprojects like quickjs in a cross build.

[binaries]
# NDK r22+ ships clang/clang++ only as <triple><api>-clang/clang++ — the bare
# aarch64-linux-android-clang wrapper was removed, so the API-level suffix is
# required. The suffix is the minSdkVersion floor; 28 = Android 9, the
# production target per inject/design.md (Android 11 is the verified baseline).
# ar/strip/readelf and the llvm-* tools are suffix-less (binutils are
# minSdk-independent). readelf: frida-core does find_program('readelf') for the
# non-darwin host_os_family (Android -> linux family); macOS ships no readelf, so
# use the NDK's llvm-readelf (already on PATH for the cross-compiler; resolves on
# linux CI too, where release.yml puts the NDK bin on PATH).
c = 'aarch64-linux-android28-clang'
cpp = 'aarch64-linux-android28-clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
readelf = 'llvm-readelf'
# Disable pkg-config for the cross target: frida bundles all
# deps (glib, gio, sqlite, etc.) as subprojects, so the HOST
# machine must not use the build host's pkg-config (which would
# leak macOS/Homebrew include paths into the Android cross-
# compiler). /usr/bin/false always exits 1, forcing meson to
# fall back to subprojects. The BUILD machine's pkg-config is
# unaffected (meson uses the system pkg-config for it).
pkg-config = '/usr/bin/false'
vala = 'valac'

[built-in options]
c_args = []
c_link_args = []
buildtype = 'release'
# strip applies at `meson install` time, not during `ninja`; `make build-android`
# runs only setup+ninja, so the CI release workflow strips the binary explicitly
# via llvm-strip. Declared here so a future install step would also strip.
strip = true
b_lto = true

[host_machine]
# system stays 'linux' (Android's kernel/libc family); subsystem conveys Android
# itself — frida-core derives host_os from host_machine.subsystem() and gates
# Android on it. A cross machine reads subsystem only from this file, so it is
# required (without it: "Subsystem not defined or could not be autodetected").
system = 'linux'
subsystem = 'android'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
