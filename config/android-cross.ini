# Meson cross-file for Android arm64-v8a via NDK.
# Requires ANDROID_NDK_HOME set to the NDK root.
# Usage: meson setup build-android --cross-file config/android-cross.ini

[binaries]
c = 'aarch64-linux-android-clang'
cpp = 'aarch64-linux-android-clang++'
ar = 'llvm-ar'
strip = 'llvm-strip'
pkgconfig = 'pkg-config'
vala = 'valac'

[built-in options]
c_args = []
c_link_args = []
buildtype = 'release'
strip = true
b_lto = true

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
