# Voboost uncrustify config for Vala — mirrors config-prettier.mjs
# (tabWidth: 4, useTabs: false) and enforces {} around all control-flow bodies.

indent_with_tabs          = 0   # spaces only
indent_columns            = 4
input_tab_size            = 4
output_tab_size           = 4

# Newline before opening brace of function body
nl_fdef_brace             = add

# Braces around single-statement if/else/for/while/do bodies
nl_if_brace               = add
nl_else_brace             = add
nl_for_brace              = add
nl_while_brace            = add
nl_do_brace               = add
nl_brace_else             = add

# No brace on same line as condition (Allman-style for blocks)
mod_full_brace_if         = add
mod_full_brace_for        = add
mod_full_brace_while      = add
mod_full_brace_do         = add
