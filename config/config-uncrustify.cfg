# Voboost uncrustify config for Vala — mirrors config-prettier.mjs
# (tabWidth: 4, useTabs: false) and enforces {} around all control-flow bodies.
# Uses K&R-style braces to match vala-lint requirements.

indent_with_tabs          = 0   # spaces only
indent_columns            = 4
input_tab_size            = 4
output_tab_size           = 4

# K&R-style: opening brace on same line (no newline before)
nl_fdef_brace             = remove
nl_if_brace               = remove
nl_else_brace             = remove
nl_for_brace              = remove
nl_while_brace            = remove
nl_do_brace               = remove
nl_brace_else             = remove

# Space before opening brace (required by vala-lint)
sp_fparen_brace           = add   # space between ')' and '{' of function
sp_sparen_brace           = add   # space between ')' and '{' of control statements
sp_else_brace             = add   # space between 'else' and '{'
sp_do_brace_open          = add   # space between 'do' and '{'

# No space before '(' in function calls/definitions
sp_func_call_paren        = remove
sp_func_def_paren         = remove
sp_func_call_paren_empty  = remove
sp_func_def_paren_empty   = remove

# Braces around single-statement if/else/for/while/do bodies
mod_full_brace_if         = add
mod_full_brace_for        = add
mod_full_brace_while      = add
mod_full_brace_do         = add
